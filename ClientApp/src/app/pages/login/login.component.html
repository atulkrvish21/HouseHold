<div class="min-h-screen flex items-center justify-center 
            bg-gradient-to-br from-blue-600 via-indigo-600 to-purple-600 px-4">

  <div class="w-full max-w-md bg-white/95 backdrop-blur rounded-2xl shadow-2xl p-6 sm:p-8">

    <!-- Logo / Title -->
    <div class="text-center mb-6">
      <div class="mx-auto mb-3 h-14 w-14 rounded-full 
                  bg-gradient-to-tr from-blue-500 to-indigo-500
                  flex items-center justify-center text-white text-2xl font-bold">
        HH
      </div>

      <h2 class="text-2xl font-semibold text-gray-800">
        HH Survey Login
      </h2>
      <p class="text-sm text-gray-500 mt-1">
        Secure access for field staff
      </p>
    </div>

    <!-- Login Form -->
    <form (ngSubmit)="login()" class="space-y-4">

      <!-- Username -->
      <div>
        <label class="block text-sm font-medium text-gray-600">
          Username 
        </label>
        <input
          type="text"
          [(ngModel)]="model.username"
          name="username"
          required
          class="mt-1 w-full rounded-lg border border-gray-300 px-4 py-2
                 focus:outline-none focus:ring-2 focus:ring-indigo-500
                 focus:border-indigo-500 transition"
          placeholder="Enter username or mobile"
        />
      </div>

      <!-- Password -->
      <div>
        <label class="block text-sm font-medium text-gray-600">
          Password
        </label>
        <input
          type="password"
          [(ngModel)]="model.password"
          name="password"
          required
          class="mt-1 w-full rounded-lg border border-gray-300 px-4 py-2
                 focus:outline-none focus:ring-2 focus:ring-indigo-500
                 focus:border-indigo-500 transition"
          placeholder="Enter password"
        />
      </div>

      <!-- Error -->
      <div *ngIf="errorMessage"
           class="text-sm text-red-600 bg-red-50 border border-red-200
                  rounded-md px-3 py-2">
        {{ errorMessage }}
      </div>

      <!-- Button -->
      <button
        type="submit"
        class="w-full py-2.5 rounded-lg text-white font-medium
               bg-gradient-to-r from-indigo-600 to-blue-600
               hover:from-indigo-700 hover:to-blue-700
               transition-all duration-200
               shadow-md hover:shadow-lg
               disabled:opacity-50"
        [disabled]="loading"
      >
        {{ loading ? 'Signing in...' : 'Login' }}
      </button>
    </form>

    <!-- Footer -->
    <p class="text-xs text-gray-400 text-center mt-6">
      © 2025 HH Survey System
    </p>
  </div>
</div>
